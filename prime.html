<html>

<head>

</head>
<body>
    <h1>Prime Number checker<h1>
    <script>
        var n=parseInt(prompt("Enter a the value of n"));
        document.write("Prime no from 1 to "+n+" <br>");
        for(var i=1;i<=n;i++)
        {
            var flag=true;
            for(var j=2;j<=parseInt(i/2);j++)
            {
                if(i%j==0)
                {
                    flag=false;
                    break;
                }
            }
            if(flag==true)
            {
                document.write(i+" ");
            }
        }
    </script>
</body>
</html>
