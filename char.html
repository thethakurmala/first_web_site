<html>

    <body>
        <script>
		document.write("welcome");
                var s= prompt("Enter a the string");
                var word=1;
                var vowel=0;
                var cons=0;
                var character=0;
                for(var i in s)
                {
                    if(s[i]=='A' || s[i]=='E'||s[i]=='I'||s[i]=='O'||s[i]=='U'||s[i]=='a'||s[i]=='e'||s[i]=='i'||s[i]=='o'||s[i]=='u')
                    {
                        vowel++;
                    }
                    else
                    {
                        cons++;
                    } 
                    if(s[i]=='')
                    {
                        word++;
                    }
                    character++;

                }
                document.write("Inputted string:"+s+"<br>");
                document.write("No. of words:"+word+"<br>");
                document.write("No. of characters:"+character+"<br>");
                document.write("No. of vowel:"+vowel+"<br>");
                document.write("No. of consonents:"+cons+"<br>");

        </script>
    </body>
    </html>
