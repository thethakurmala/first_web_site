<html>
    <head>
        <title>hy I am here.</title>
        <style>
                .container
                {
                    margin:5px;
                    padding:5px;
                    background:lightgray;
                }
                .container div
                {
                    margin:5px;
                    padding:5px;
                }
                #submit
                {
                    background:green;
                    border:none;
                }
                .msg
                {
                    color:red;
                }
                .txtbox
                {
                    width:60%;
                    height:30px;
                }
        </style>
    </head>
    <body>
        <div class="container">
            <form onsubmit="validation()" action="#">
		<div><h2>Registration Form</h2></div>
                <div>
                    <lable>Name:</lable>
                        <input type="text" class="txtbox" id="name" placeholder="Enter your name" autofocus>
                        <br><span id="name-msg" class="msg"></span>

                </div>
                <div>
                    <lable>Age:</lable>
                        <input type="text" class="txtbox" id="age" placeholder="Enter your age">
                        <br><span id="age-msg" class="msg"></span>
                </div>
                <div>
                    <lable>College Name:</lable>
                    <input type="text" class="txtbox" id="college-name" placeholder="Enter your College Name here">
                    <br><span id="College-name-msg" class="msg"></span>
                </div>
                <div>
                    <lable> Course Name:</lable>
                    <input type="text" class="txtbox" id="Coure-name" placeholder="Enter your course">
                    <br><span id="course-name-msg" class="msg"></span>
                </div>
                <div>
                    <lable> Reg.No.</lable>
                    <input type="text" class="txtbox" id="Reg.No." placeholder="Enter your Reg.No.">
                    <br><span id="Reg.No.-msg" class="msg"></span>
                </div>
                <div>
                    <input type="submit" id="Submit">
                </div>

            </form>

        </div>
        <script>
            function validation()
            {
            const ch=/A-Za-z/;
            var name=document.getElementById("name").value;
            var age=document.getElementById("age").value;
            var college_name=document.getElementById("college-name").value;
            var course_name=document.getElementById("course-name").value;
            var Reg_no=document.getElementById("Reg.No.").value;
            if(name=="")
            {
                document.getElementById("name-msg").innerHTML="**please fill the name";

            }
           else if(!name.match(ch))
            {
               document.getElementById("name-msg").innerHTML="**name should be only letter "; 
            }
            if(age=="")
            {
                document.getElementById("age-msg").innerHTML="**please fill the age";
            }
            else if(isNaN(age))
            {
                document.getElementById("age-msg").innerHTML="**age should be only numeric";
            }
            if(parseInt(age)<=18)
            {
                document.getElementById("age-msg").innerHTML="**age should be only be above 18";
            }
            if(college_name=="")
            {
                document.getElementById("college-name-msg").innerHTML="**please fill the college name";
            }
            if(course_name=="")
            {
                document.getElementById("course-name-msg").innerHTML="**please fill the course name";
            }
            if(Reg_no=="")
            {
                document.getElementById("Reg.No.-msg").innerHTML="**please fill the registration number";
            }
            else if(isNaN(Reg_no))
            {
                document.getElementById("Reg.No.-msg").innerHTML="**registration number should be only numeric";
            }
        }
        </script>
    </body>
    </html>
